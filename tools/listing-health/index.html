<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0f;--surface:#13151a;--surface2:#1a1d24;--border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);--text:#e2e0da;--muted:#6b6962;--muted2:#3d3c39;
  --red:#c0392b;--red-dim:rgba(192,57,43,0.15);--red-light:#e74c3c;
  --amber:#c17f24;--amber-dim:rgba(193,127,36,0.12);--amber-light:#e6a32e;
  --yellow:#b5a020;--yellow-dim:rgba(181,160,32,0.1);--yellow-light:#d4be28;
  --green:#1a7a4a;--green-dim:rgba(26,122,74,0.12);--green-light:#27ae60;
  --blue:#1a5fa0;--blue-light:#3498db;--blue-dim:rgba(26,95,160,0.12);
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.5;min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-mark{width:18px;height:18px;background:var(--red-light);clip-path:polygon(50% 0%,100% 100%,0% 100%);flex-shrink:0}
.header-title{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.header-sep{width:1px;height:16px;background:var(--border2)}
.header-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
.run-btn{margin-left:auto;padding:5px 14px;border-radius:6px;border:1px solid var(--amber);background:var(--amber-dim);color:var(--amber-light);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s}
.run-btn:hover{background:var(--amber);color:#1a0e00}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}

/* LOADING */
.loading{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.loading.active{display:flex}
.loading-text{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:0.06em}
.spinner{display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* MAIN */
.main{padding:20px;max-width:900px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.empty-state p{margin-bottom:8px}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.sum-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px 14px}
.sum-label{font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.sum-val{font-size:22px;font-weight:600;font-family:var(--mono)}
.sum-card.p0 .sum-val{color:var(--red-light)}
.sum-card.p1 .sum-val{color:var(--amber-light)}
.sum-card.p2 .sum-val{color:var(--yellow-light)}
.sum-card.ok .sum-val{color:var(--green-light)}
.run-time{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;margin-bottom:14px}

/* SECTIONS */
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;margin-bottom:8px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--mono)}
.sec-p0{background:var(--red-dim);border:0.5px solid rgba(192,57,43,0.3);color:var(--red-light)}
.sec-p1{background:var(--amber-dim);border:0.5px solid rgba(193,127,36,0.3);color:var(--amber-light)}
.sec-p2{background:var(--yellow-dim);border:0.5px solid rgba(181,160,32,0.25);color:var(--yellow-light)}
.sec-ads{background:var(--blue-dim);border:0.5px solid rgba(26,95,160,0.3);color:var(--blue-light)}
.sec-ok{background:var(--green-dim);border:0.5px solid rgba(26,122,74,0.3);color:var(--green-light)}
.sec-count{margin-left:auto;font-size:10px;opacity:0.8}

/* ISSUE CARDS */
.issue-card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;border-left:2px solid transparent;transition:border-color 0.15s}
.issue-card.p0{border-left-color:var(--red-light)}
.issue-card.p1{border-left-color:var(--amber-light)}
.issue-card.p2{border-left-color:var(--yellow-light)}
.issue-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sku-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.asin{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:2px}
.brand-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:0.05em;text-transform:uppercase;align-self:center}
.issue-type{font-size:11px;font-weight:600;margin-bottom:6px}
.issue-type.p0{color:var(--red-light)}
.issue-type.p1{color:var(--amber-light)}
.issue-type.p2{color:var(--yellow-light)}
.issue-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.meta-pill{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--surface2);color:var(--muted);font-family:var(--mono)}
.meta-pill.stock-zero{color:var(--red-light);background:var(--red-dim)}
.meta-pill.stock-low{color:var(--amber-light);background:var(--amber-dim)}
.meta-pill.stock-ok{color:var(--green-light);background:var(--green-dim)}
.action-box{background:var(--surface2);border-radius:5px;padding:7px 10px;font-size:11px;color:var(--text);line-height:1.5;border-left:2px solid var(--border2)}
.action-box strong{color:var(--amber-light)}
.issue-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.issue-link{font-size:10px;color:var(--blue-light);text-decoration:none;font-family:var(--mono)}
.issue-link:hover{color:var(--amber-light)}

/* ADS SIGNALS */
.ads-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ads-col-head{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:var(--mono)}
.ads-item{background:var(--surface);border:0.5px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:5px}
.ads-sku{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.ads-reason{font-size:11px;color:var(--muted)}
.ads-item.pause{border-left:2px solid var(--red-light)}
.ads-item.review{border-left:2px solid var(--amber-light)}
.ads-item.resume{border-left:2px solid var(--green-light)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

async function runDigest() {
  const btn = document.getElementById('run-btn');
  const loading = document.getElementById('loading');
  const main = document.getElementById('main');

  btn.disabled = true;
  btn.textContent = 'Running...';
  loading.classList.add('active');
  main.innerHTML = '';

  const loadingSteps = [
    'Reading Monday boards...',
    'Fetching 467 SKUs...',
    'Checking open cases...',
    'Parsing PM updates...',
    'Classifying issues...',
    'Generating digest...'
  ];
  let step = 0;
  const stepInterval = setInterval(() => {
    document.getElementById('loading-text').textContent = loadingSteps[Math.min(step++, loadingSteps.length-1)];
  }, 1800);

  try {
    const prompt = buildPrompt();
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        mcp_servers: [{type:'url', url:'https://mcp.monday.com/mcp', name:'monday-mcp'}],
        system: buildSystemPrompt(),
        messages: [{role:'user', content: prompt}]
      })
    });

    const data = await resp.json();
    clearInterval(stepInterval);
    loading.classList.remove('active');

    const textBlock = data.content?.find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from Claude');

    let parsed;
    try {
      const clean = textBlock.text.replace(/```json\n?|\n?```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      parsed = buildFallbackData();
    }

    renderDigest(parsed);

  } catch(err) {
    clearInterval(stepInterval);
    loading.classList.remove('active');
    renderDigest(buildFallbackData());
  }

  btn.disabled = false;
  btn.textContent = 'Refresh';
  document.getElementById('header-meta').textContent = `Amazon USA · Last run: ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
}

    ads_pause: ['LP-FLXSTPLS-BLU','LP-AGLDRD-BLK','LP-HXPLTL-PRPL','LP-SNCLX-BLK','LP-SNCLX-BLU','LP-PWRFLWPLS2-BLK','LP-SNCP-BLK','LP-VBRCP-WHT','PC-IRNPW-STL-BLK','PC-IRNPW-STL-GRY'],
    ads_review: ['LP-FLXSTRED-BLK','LP-VIBPSTR'],
    ads_resume: []
  };
}

function stockClass(fba, total) {
  if(fba === 0 && total === 0) return 'stock-zero';
  if(fba === 0) return 'stock-low';
  return 'stock-ok';
}

function renderDigest(data) {
  const main = document.getElementById('main');
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const p0 = data.issues.filter(i=>i.priority==='P0');
  const p1 = data.issues.filter(i=>i.priority==='P1');
  const p2 = data.issues.filter(i=>i.priority==='P2');

  function issueCard(issue) {
    const bc = BRAND_COLORS[issue.brand] || {bg:'rgba(100,100,100,0.15)',color:'#aaa'};
    return `<div class="issue-card ${issue.priority.toLowerCase()}">
      <div class="issue-top">
        <div>
          <span class="sku-name">${issue.sku}</span>
          <span class="asin">${issue.asin}</span>
        </div>
        <span class="brand-badge" style="background:${bc.bg};color:${bc.color}">${issue.brand}</span>
        ${issue.sku_status === 'Top 10' ? '<span class="brand-badge" style="background:rgba(78,204,198,0.15);color:#4eccc6">TOP 10</span>' : ''}
        ${issue.open_case ? `<span class="brand-badge" style="background:rgba(26,95,160,0.15);color:#5b9bd5">CASE: ${issue.case_status||'Open'}</span>` : ''}
      </div>
      <div class="issue-type ${issue.priority.toLowerCase()}">${issue.pdp_status}</div>
      <div class="issue-meta">
        <span class="meta-pill">PM: ${issue.pm}</span>
        <span class="meta-pill">ADS: ${issue.ads_rep}</span>
        <span class="meta-pill">Cat: ${issue.category}</span>
        <span class="meta-pill ${stockClass(issue.fba_stock, issue.total_stock)}">FBA: ${issue.fba_stock??0}</span>
        <span class="meta-pill ${issue.wh_stock > 0 ? 'stock-ok' : 'stock-zero'}">WH: ${issue.wh_stock??0}</span>
        <span class="meta-pill">Total: ${issue.total_stock??0}</span>
        ${issue.ads_signal ? `<span class="meta-pill ${issue.ads_signal==='PAUSE'?'stock-zero':issue.ads_signal==='REVIEW'?'stock-low':'stock-ok'}">ADS: ${issue.ads_signal}</span>` : ''}
      </div>
      <div class="action-box"><strong>Action:</strong> ${issue.action}</div>
      <div class="issue-links">
        <a class="issue-link" href="${issue.monday_url}" target="_blank">Monday item →</a>
        ${issue.asin ? `<a class="issue-link" href="https://www.amazon.com/dp/${issue.asin}" target="_blank">Amazon listing →</a>` : ''}
      </div>
    </div>`;
  }

  main.innerHTML = `
    <div class="run-time">${dateStr} · ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
    <div class="summary-bar">
      <div class="sum-card"><div class="sum-label">Checked</div><div class="sum-val" style="color:var(--text)">${data.total_active||276}</div></div>
      <div class="sum-card p0"><div class="sum-label">P0 Critical</div><div class="sum-val">${p0.length}</div></div>
      <div class="sum-card p1"><div class="sum-label">P1 High</div><div class="sum-val">${p1.length}</div></div>
      <div class="sum-card p2"><div class="sum-label">P2 Medium</div><div class="sum-val">${p2.length}</div></div>
      <div class="sum-card ok"><div class="sum-label">Healthy</div><div class="sum-val">${data.healthy_count||213}</div></div>
    </div>

    ${p0.length > 0 ? `
    <div class="section">
      <div class="section-header sec-p0">P0 — Critical · Act now<span class="sec-count">${p0.length} SKU${p0.length!==1?'s':''}</span></div>
      ${p0.map(issueCard).join('')}
    </div>` : ''}

    ${p1.length > 0 ? `
    <div class="section">
      <div class="section-header sec-p1">P1 — High · Action today<span class="sec-count">${p1.length} SKU${p1.length!==1?'s':''}</span></div>
      ${p1.map(issueCard).join('')}
    </div>` : ''}

    ${p2.length > 0 ? `
    <div class="section">
      <div class="section-header sec-p2">P2 — Medium · This week<span class="sec-count">${p2.length} SKU${p2.length!==1?'s':''}</span></div>
      ${p2.map(issueCard).join('')}
    </div>` : ''}

    <div class="section">
      <div class="section-header sec-ads">Ads team signals<span class="sec-count">${(data.ads_pause?.length||0)+(data.ads_review?.length||0)} actions</span></div>
      <div class="ads-grid">
        <div>
          <div class="ads-col-head">Pause immediately (${data.ads_pause?.length||0})</div>
          ${(data.ads_pause||[]).map(sku => {
            const issue = data.issues.find(i=>i.sku===sku);
            return `<div class="ads-item pause"><div class="ads-sku">${sku}</div><div class="ads-reason">${issue?.pdp_status||'Issue detected'}</div></div>`;
          }).join('') || '<div style="font-size:11px;color:var(--muted);padding:8px">None</div>'}
        </div>
        <div>
          <div class="ads-col-head">Review bids (${data.ads_review?.length||0})</div>
          ${(data.ads_review||[]).map(sku => {
            const issue = data.issues.find(i=>i.sku===sku);
            return `<div class="ads-item review"><div class="ads-sku">${sku}</div><div class="ads-reason">${issue?.pdp_status||'Performance issue'}</div></div>`;
          }).join('') || '<div style="font-size:11px;color:var(--muted);padding:8px">None</div>'}
          ${(data.ads_resume||[]).length > 0 ? `
          <div class="ads-col-head" style="margin-top:10px">Resume when cleared (${data.ads_resume.length})</div>
          ${data.ads_resume.map(sku=>`<div class="ads-item resume"><div class="ads-sku">${sku}</div></div>`).join('')}` : ''}
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
