<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category Analysis — Lifepro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0f;--surface:#13151a;--surface2:#1a1d24;--surface3:#21252f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e0da;--muted:#6b6962;--muted2:#3d3c39;
  --red:#c0392b;--red-dim:rgba(192,57,43,0.15);--red-light:#e74c3c;
  --amber:#c17f24;--amber-dim:rgba(193,127,36,0.12);--amber-light:#e6a32e;
  --green:#1a7a4a;--green-dim:rgba(26,122,74,0.12);--green-light:#27ae60;
  --blue:#1a5fa0;--blue-light:#3498db;--blue-dim:rgba(26,95,160,0.12);
  --purple:#6d28d9;--purple-light:#8b5cf6;--purple-dim:rgba(109,40,217,0.12);
  --mono:'JetBrains Mono','Fira Code',monospace;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;flex-shrink:0}
.header-mark{width:18px;height:18px;background:var(--purple-light);clip-path:polygon(50% 0%,100% 100%,0% 100%);flex-shrink:0}
.header-title{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.header-sep{width:1px;height:16px;background:var(--border2)}
.header-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
.new-btn{margin-left:auto;padding:5px 14px;border-radius:6px;border:1px solid var(--purple-light);background:var(--purple-dim);color:var(--purple-light);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s}
.new-btn:hover{background:var(--purple-light);color:#fff}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.sidebar-empty{padding:24px 16px;color:var(--muted);font-size:12px;text-align:center}
.analysis-item{padding:10px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s}
.analysis-item:hover{background:var(--surface2)}
.analysis-item.active{background:var(--purple-dim);border-left:2px solid var(--purple-light)}
.ai-category{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.ai-meta{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:5px}
.ai-badges{display:flex;gap:4px;flex-wrap:wrap}
.trend-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;letter-spacing:0.04em;text-transform:uppercase}
.tb-up{background:var(--green-dim);color:var(--green-light)}
.tb-down{background:var(--red-dim);color:var(--red-light)}
.tb-flat{background:var(--surface2);color:var(--muted)}
.tb-harder{background:var(--red-dim);color:var(--red-light)}
.tb-easier{background:var(--green-dim);color:var(--green-light)}
.tb-stable{background:var(--surface2);color:var(--muted)}
.tb-high{background:var(--amber-dim);color:var(--amber-light)}
.tb-medium{background:var(--surface2);color:var(--muted)}
.tb-low{background:var(--green-dim);color:var(--green-light)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:32px;display:flex;flex-direction:column;align-items:center}

/* HOME STATE */
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;max-width:520px;width:100%;text-align:center;margin:auto}
.home-icon{font-size:32px;margin-bottom:16px}
.home-title{font-size:20px;font-weight:700;margin-bottom:8px}
.home-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.home-form{text-align:left;display:flex;flex-direction:column;gap:14px}
.field-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s}
.field-input:focus{border-color:var(--purple-light)}
.field-input::placeholder{color:var(--muted)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.start-btn{width:100%;padding:11px;border-radius:8px;background:var(--purple-light);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-top:6px}
.start-btn:hover{background:#7c3aed}
.start-btn:disabled{opacity:0.4;cursor:default}

/* DISAMBIGUATION */
.disambig-wrap{max-width:560px;width:100%;margin:auto}
.step-title{font-size:16px;font-weight:700;margin-bottom:6px}
.step-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.disambig-options{display:flex;flex-direction:column;gap:10px}
.option-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s}
.option-card:hover{border-color:var(--purple-light);background:var(--purple-dim)}
.option-label{font-size:13px;font-weight:500}
.option-kw{font-size:11px;color:var(--muted);font-family:var(--mono)}
.option-arrow{color:var(--purple-light);font-size:16px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--purple-light);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:auto}
.loading-label{font-size:12px;color:var(--muted)}

/* COLLECTING STATE */
.collect-wrap{max-width:720px;width:100%}
.collect-header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.collect-cat{font-size:15px;font-weight:700}
.collect-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
.collect-meta span{color:var(--text)}
.source-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.source-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.2s}
.source-card.ready{border-color:var(--green)}
.source-card.error{border-color:var(--red)}
.sc-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.sc-icon{font-size:16px;flex-shrink:0}
.sc-name{font-size:12px;font-weight:600;flex:1}
.sc-badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:0.04em;text-transform:uppercase}
.badge-auto{background:var(--blue-dim);color:var(--blue-light)}
.badge-screenshot{background:var(--surface2);color:var(--muted)}
.badge-ready{background:var(--green-dim);color:var(--green-light)}
.sc-status{font-size:11px;color:var(--muted);font-family:var(--mono)}
.sc-body{padding:12px 16px}
.sc-instruction{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6}
.sc-instruction strong{color:var(--text)}
.sc-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.open-btn{padding:6px 12px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--blue-light);font-size:11px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.open-btn:hover{border-color:var(--blue-light);background:var(--blue-dim)}
.upload-label{padding:6px 12px;border-radius:6px;background:var(--purple-dim);border:1px solid var(--purple-light);color:var(--purple-light);font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.upload-label:hover{background:var(--purple-light);color:#fff}
.upload-input{display:none}
.sc-preview{display:none;margin-top:10px}
.sc-preview img{max-width:100%;max-height:180px;border-radius:6px;border:1px solid var(--border2);object-fit:cover}
.sc-ready-label{font-size:11px;color:var(--green-light);font-weight:600;display:flex;align-items:center;gap:5px}
.dd-result{background:var(--surface2);border-radius:6px;padding:10px 12px;margin-top:4px}
.dd-niche{font-size:12px;font-weight:600;margin-bottom:4px}
.dd-stats{display:flex;gap:16px;flex-wrap:wrap}
.dd-stat{font-size:11px;color:var(--muted)}
.dd-stat span{color:var(--text);font-weight:600;font-family:var(--mono)}
.dd-keywords{margin-top:8px}
.dd-kw-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.dd-kw-list{display:flex;flex-wrap:wrap;gap:4px}
.dd-kw-chip{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface3);color:var(--muted2);font-family:var(--mono)}
.dd-kw-chip.top{background:var(--blue-dim);color:var(--blue-light)}

/* SYNTHESISE BUTTON */
.synth-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.synth-status{font-size:12px;color:var(--muted)}
.synth-status strong{color:var(--text)}
.synth-btn{padding:9px 24px;border-radius:8px;background:var(--purple-light);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.synth-btn:hover{background:#7c3aed}
.synth-btn:disabled{opacity:0.35;cursor:default}

/* SYNTHESISING STATE */
.synth-loading{display:flex;flex-direction:column;align-items:center;gap:16px;margin:auto;text-align:center}
.synth-steps{display:flex;flex-direction:column;gap:6px;min-width:280px;margin-top:8px}
.synth-step{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);padding:6px 10px;border-radius:6px}
.synth-step.active{color:var(--text);background:var(--surface2)}
.synth-step.done{color:var(--green-light)}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);flex-shrink:0}
.synth-step.active .step-dot{background:var(--purple-light)}
.synth-step.done .step-dot{background:var(--green-light)}

/* REPORT */
.report-wrap{max-width:720px;width:100%}
.report-header{margin-bottom:24px}
.report-title{font-size:22px;font-weight:800;margin-bottom:4px}
.report-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:16px}
.signal-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sig-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.04em}
.sig-up{background:var(--green-dim);color:var(--green-light);border:1px solid rgba(26,122,74,0.3)}
.sig-down{background:var(--red-dim);color:var(--red-light);border:1px solid rgba(192,57,43,0.3)}
.sig-flat{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sig-harder{background:var(--red-dim);color:var(--red-light);border:1px solid rgba(192,57,43,0.3)}
.sig-easier{background:var(--green-dim);color:var(--green-light);border:1px solid rgba(26,122,74,0.3)}
.sig-stable{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sig-high{background:var(--amber-dim);color:var(--amber-light);border:1px solid rgba(193,127,36,0.3)}
.sig-medium{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sig-low{background:var(--green-dim);color:var(--green-light);border:1px solid rgba(26,122,74,0.3)}
.verdict-box{background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--purple-light);border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:24px;font-size:13px;line-height:1.7;color:var(--text)}
.verdict-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--purple-light);margin-bottom:6px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px}
.section-card-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--purple-light);margin-bottom:10px}
.section-card-body{font-size:13px;line-height:1.7;color:var(--text)}
.strategic-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:640px){.strategic-grid{grid-template-columns:1fr}}
.strat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.strat-title{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.strat-opp{color:var(--green-light)}
.strat-chal{color:var(--amber-light)}
.strat-risk{color:var(--red-light)}
.strat-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.strat-list li{font-size:12px;color:var(--muted);padding-left:12px;position:relative;line-height:1.5}
.strat-list li::before{content:'';position:absolute;left:0;top:7px;width:4px;height:4px;border-radius:50%}
.strat-opp .strat-list li::before{background:var(--green-light)}
.strat-chal .strat-list li::before{background:var(--amber-light)}
.strat-risk .strat-list li::before{background:var(--red-light)}
.signal-align{font-size:11px;color:var(--muted);font-style:italic;padding:10px 0}
.report-actions{display:flex;gap:10px;margin-top:20px}
.btn-ghost{padding:7px 16px;border-radius:6px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
</style>
</head>
<body>

<header class="header">
  <div class="header-mark"></div>
  <div class="header-title">Category Analysis</div>
  <div class="header-sep"></div>
  <div class="header-meta">Lifepro Amazon USA · Market Intelligence</div>
  <button class="new-btn" onclick="goHome()">+ New Analysis</button>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Past Analyses</div>
    <div id="sidebar-list"><div class="sidebar-empty">Loading...</div></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let appState = 'home';
let confirmedCategory = '';
let searchKeyword = '';
let analyst = '';
let period = '';
let datadiveData = null;
let datadiveStatus = 'idle'; // 'idle' | 'loading' | 'found' | 'notfound' | 'error'
let screenshots = {}; // { sourceId: { base64, mimeType } }
let currentAnalysisId = null;

// ─── Source definitions ───────────────────────────────────────────────────────
const SOURCES = [
  {
    id: 'trends',
    name: 'Google Trends',
    icon: '📈',
    instruction: kw => `Open the link below. Set to <strong>United States · Past 12 months</strong>. Screenshot the full chart.`,
    url: kw => `https://trends.google.com/trends/explore?q=${encodeURIComponent(kw)}&geo=US&date=today%2012-m`,
    urlLabel: 'Open Google Trends ↗',
  },
  {
    id: 'poe',
    name: 'Product Opportunity Explorer',
    icon: '🔍',
    instruction: kw => `In Vendor Central go to <strong>Analytics → Product Opportunity Explorer</strong>. Search for <strong>"${kw}"</strong>. Make sure the <em>Opportunity Explorer Insights</em> extension panel is visible. Screenshot the full page.`,
    url: () => `https://vendorcentral.amazon.com`,
    urlLabel: 'Open Vendor Central ↗',
  },
  {
    id: 'smartscout',
    name: 'Smart Scout',
    icon: '🏆',
    instruction: kw => `Log into Smart Scout. Search for <strong>"${kw}"</strong>. Navigate to <strong>Brand Market Share</strong>. Screenshot showing top brands and their market share %.`,
    url: () => `https://www.smartscout.com`,
    urlLabel: 'Open Smart Scout ↗',
  },
  {
    id: 'datarova',
    name: 'Datarova',
    icon: '📊',
    instruction: kw => `Go to Datarova. Open the <strong>Trends</strong> tab and search for <strong>"${kw}"</strong>. Screenshot showing this year vs last year comparison (clicks, sales, conv rate).`,
    url: () => `https://www.datarova.com`,
    urlLabel: 'Open Datarova ↗',
  },
  {
    id: 'growth',
    name: 'Growth Opportunities',
    icon: '📦',
    instruction: kw => `In Vendor Central go to <strong>Analytics → Growth Opportunities</strong>. Search for <strong>"${kw}"</strong>. Screenshot showing search volume, units sold, avg price, avg rating, return rate.`,
    url: () => `https://vendorcentral.amazon.com`,
    urlLabel: 'Open Vendor Central ↗',
  },
  {
    id: 'mpg',
    name: 'Marketplace Product Guidance',
    icon: '🗺️',
    instruction: kw => `In Vendor Central go to <strong>Selling Coach → Marketplace Product Guidance</strong>. Find <strong>"${kw}"</strong>. Screenshot the demand and sales opportunity charts.`,
    url: () => `https://vendorcentral.amazon.com`,
    urlLabel: 'Open Vendor Central ↗',
  },
];

// ─── Sidebar ──────────────────────────────────────────────────────────────────
async function loadSidebar() {
  try {
    const r = await fetch('/api/analyses?action=list');
    const list = await r.json();
    const el = document.getElementById('sidebar-list');
    if (!list.length) { el.innerHTML = '<div class="sidebar-empty">No analyses yet</div>'; return; }
    el.innerHTML = list.map(a => `
      <div class="analysis-item${currentAnalysisId===a.id?' active':''}" onclick="loadAnalysis('${a.id}')">
        <div class="ai-category">${a.category||'Unknown'}</div>
        <div class="ai-meta">${a.period||''} · ${a.analyst||''}</div>
        <div class="ai-badges">
          ${trendBadge('market', a.market_trend)}
          ${trendBadge('asp', a.asp_trend)}
          ${compBadge(a.competition_trend)}
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('sidebar-list').innerHTML = '<div class="sidebar-empty">Failed to load</div>';
  }
}

function trendBadge(type, val) {
  if (!val) return '';
  const label = type === 'market' ? 'Market' : 'ASP';
  const cls = val === 'up' ? 'tb-up' : val === 'down' ? 'tb-down' : 'tb-flat';
  const arrow = val === 'up' ? '↑' : val === 'down' ? '↓' : '→';
  return `<span class="trend-badge ${cls}">${label} ${arrow}</span>`;
}
function compBadge(val) {
  if (!val) return '';
  const cls = val === 'harder' ? 'tb-harder' : val === 'easier' ? 'tb-easier' : 'tb-stable';
  const label = val === 'harder' ? 'Harder' : val === 'easier' ? 'Easier' : 'Stable';
  return `<span class="trend-badge ${cls}">Comp ${label}</span>`;
}

async function loadAnalysis(id) {
  currentAnalysisId = id;
  document.querySelectorAll('.analysis-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(id));
  });
  setMain(`<div class="loading-wrap"><div class="spinner"></div><div class="loading-label">Loading analysis...</div></div>`);
  try {
    const r = await fetch(`/api/analyses?action=get&id=${id}`);
    const a = await r.json();
    if (!a) throw new Error('Not found');
    renderReport(a.analysis, a.category, a.period, a.analyst, a.created_at);
  } catch(e) {
    setMain(`<div class="loading-wrap" style="color:var(--red-light)">Failed to load analysis.</div>`);
  }
}

// ─── Navigation helpers ───────────────────────────────────────────────────────
function setMain(html) {
  document.getElementById('main').innerHTML = html;
}

function goHome() {
  appState = 'home';
  currentAnalysisId = null;
  document.querySelectorAll('.analysis-item').forEach(el => el.classList.remove('active'));
  renderHome();
}

// ─── HOME STATE ───────────────────────────────────────────────────────────────
function renderHome() {
  const now = new Date();
  const defaultPeriod = now.toLocaleString('en-US', { month: 'long', year: 'numeric' });
  setMain(`
    <div class="home-card">
      <div class="home-icon">📊</div>
      <div class="home-title">New Category Analysis</div>
      <div class="home-sub">Enter the product category, then collect data from 7 sources.<br>DataDive pulls automatically — the rest need a quick screenshot.</div>
      <div class="home-form">
        <div>
          <div class="field-label">Product Category</div>
          <input id="inp-category" class="field-input" placeholder="e.g. massage gun, infrared sauna blanket..." autocomplete="off"
            onkeydown="if(event.key==='Enter')startAnalysis()">
        </div>
        <div class="field-row">
          <div>
            <div class="field-label">Your Name</div>
            <input id="inp-analyst" class="field-input" placeholder="e.g. Sarah" value="${analyst}">
          </div>
          <div>
            <div class="field-label">Period</div>
            <input id="inp-period" class="field-input" placeholder="e.g. March 2026" value="${period||defaultPeriod}">
          </div>
        </div>
        <button class="start-btn" onclick="startAnalysis()">Start Analysis →</button>
      </div>
    </div>`);
  document.getElementById('inp-category')?.focus();
}

// ─── DISAMBIGUATION ───────────────────────────────────────────────────────────
async function startAnalysis() {
  const cat = document.getElementById('inp-category')?.value?.trim();
  analyst = document.getElementById('inp-analyst')?.value?.trim() || 'PM';
  period = document.getElementById('inp-period')?.value?.trim() || new Date().toLocaleString('en-US',{month:'long',year:'numeric'});
  if (!cat) return;

  appState = 'disambiguating';
  setMain(`<div class="loading-wrap"><div class="spinner"></div><div class="loading-label">Checking category...</div></div>`);

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: `You are a category disambiguation assistant for a health & wellness 1P Amazon brand (Lifepro). Your only job is to determine if a product term is specific enough to identify a single Amazon category, or if it's ambiguous. Be strict — "massage gun" is fine, but "sauna" or "massager" or "bike" are ambiguous. Return ONLY valid JSON with no markdown.`,
        messages: [{
          role: 'user',
          content: `The PM typed: "${cat}"\n\nReturn JSON: {"ambiguous": boolean, "confirmed": "exact category label or null", "keyword": "search keyword for DataDive/trends or null", "options": [{"label": "Display name", "keyword": "search term"}] or null}\n\nIf not ambiguous: confirmed = exact category name, keyword = best search term, options = null\nIf ambiguous: confirmed = null, keyword = null, options = array of 2-5 specific sub-categories`
        }]
      })
    });
    const data = await r.json();
    const text = data.content?.[0]?.text || '{}';
    const json = JSON.parse(text.replace(/```json\n?|\n?```/g,'').trim());

    if (!json.ambiguous) {
      confirmedCategory = json.confirmed || cat;
      searchKeyword = json.keyword || cat;
      renderCollecting();
    } else {
      renderChoosing(cat, json.options || []);
    }
  } catch(e) {
    // If disambiguation fails, just proceed with the raw input
    confirmedCategory = cat;
    searchKeyword = cat;
    renderCollecting();
  }
}

function renderChoosing(rawInput, options) {
  appState = 'choosing';
  setMain(`
    <div class="disambig-wrap">
      <div class="step-title">Which category do you mean?</div>
      <div class="step-sub">"${rawInput}" could refer to several distinct categories. Select the one you want to analyse:</div>
      <div class="disambig-options">
        ${options.map(o => `
          <div class="option-card" onclick="selectOption('${o.label.replace(/'/g,"\\'")}','${o.keyword.replace(/'/g,"\\'")}')">
            <div>
              <div class="option-label">${o.label}</div>
              <div class="option-kw">${o.keyword}</div>
            </div>
            <div class="option-arrow">→</div>
          </div>`).join('')}
      </div>
    </div>`);
}

function selectOption(label, keyword) {
  confirmedCategory = label;
  searchKeyword = keyword;
  renderCollecting();
}

// ─── COLLECTING STATE ─────────────────────────────────────────────────────────
function renderCollecting() {
  appState = 'collecting';
  datadiveData = null;
  datadiveStatus = 'idle';
  screenshots = {};

  setMain(`
    <div class="collect-wrap">
      <div class="collect-header">
        <div class="collect-cat">${confirmedCategory}</div>
        <div class="collect-meta">Analyst: <span>${analyst}</span></div>
        <div class="collect-meta">Period: <span>${period}</span></div>
      </div>

      <div class="source-grid">
        <!-- DataDive (auto) -->
        <div class="source-card" id="sc-datadive">
          <div class="sc-header">
            <div class="sc-icon">🤖</div>
            <div class="sc-name">DataDive</div>
            <div class="sc-badge badge-auto">Automated</div>
            <div class="sc-status" id="dd-status"><div class="spinner" style="width:12px;height:12px;border-width:1.5px"></div></div>
          </div>
          <div class="sc-body" id="dd-body"><div style="color:var(--muted);font-size:12px">Searching DataDive niches...</div></div>
        </div>

        ${SOURCES.map(src => `
        <div class="source-card" id="sc-${src.id}">
          <div class="sc-header">
            <div class="sc-icon">${src.icon}</div>
            <div class="sc-name">${src.name}</div>
            <div class="sc-badge badge-screenshot" id="badge-${src.id}">Screenshot</div>
          </div>
          <div class="sc-body">
            <div class="sc-instruction">${src.instruction(confirmedCategory)}</div>
            <div class="sc-actions">
              <a class="open-btn" href="${src.url(searchKeyword)}" target="_blank">${src.urlLabel}</a>
              <label class="upload-label" for="file-${src.id}">
                ↑ Upload screenshot
                <input type="file" id="file-${src.id}" class="upload-input" accept="image/*" onchange="handleScreenshot('${src.id}',this)">
              </label>
            </div>
            <div class="sc-preview" id="preview-${src.id}">
              <img id="img-${src.id}" src="" alt="screenshot preview">
              <div class="sc-ready-label" style="margin-top:6px">✓ Ready</div>
            </div>
          </div>
        </div>`).join('')}
      </div>

      <div class="synth-bar">
        <div class="synth-status" id="synth-status">DataDive loading…</div>
        <button class="synth-btn" id="synth-btn" disabled onclick="runSynthesis()">Synthesise →</button>
      </div>
    </div>`);

  // Kick off DataDive search in background
  searchDataDive(searchKeyword);
}

// ─── DataDive search ──────────────────────────────────────────────────────────
async function searchDataDive(keyword) {
  datadiveStatus = 'loading';
  const kw = keyword.toLowerCase();

  try {
    let match = null;
    for (let page = 1; page <= 5 && !match; page++) {
      const r = await fetch(`/api/datadive?p=${encodeURIComponent('/niches?pageSize=100&page=' + page)}`);
      if (!r.ok) throw new Error('DataDive API error');
      const data = await r.json();
      const niches = data.data || [];
      match = niches.find(n => {
        const hero = (n.heroKeyword || '').toLowerCase();
        return hero.includes(kw) || kw.includes(hero);
      });
      if (niches.length < 100) break;
    }

    if (!match) {
      datadiveStatus = 'notfound';
      document.getElementById('dd-status').textContent = '–';
      document.getElementById('dd-body').innerHTML = `<div style="color:var(--muted);font-size:12px">No matching niche found in DataDive. Synthesis will proceed without DataDive data.</div>`;
      updateSynthButton();
      return;
    }

    // Fetch niche details in parallel
    const [kwR, compR] = await Promise.all([
      fetch(`/api/datadive?p=${encodeURIComponent('/niches/' + match.nicheId + '/keywords')}`).then(r => r.json()),
      fetch(`/api/datadive?p=${encodeURIComponent('/niches/' + match.nicheId + '/competitors')}`).then(r => r.json()),
    ]);

    datadiveData = {
      niche: match,
      keywords: kwR.data,
      competitors: compR.data,
    };
    datadiveStatus = 'found';

    const stats = compR.data?.statistics || {};
    const kws = (kwR.data?.keywords || []).slice(0, 8);
    const totalSV = stats.totalSvOfKeywords;

    document.getElementById('sc-datadive').classList.add('ready');
    document.getElementById('dd-status').innerHTML = `<span style="color:var(--green-light);font-size:11px">✓ Found</span>`;
    document.getElementById('dd-body').innerHTML = `
      <div class="dd-result">
        <div class="dd-niche">${match.heroKeyword}</div>
        <div class="dd-stats">
          ${totalSV ? `<div class="dd-stat">Total SV <span>${fmtNum(totalSV)}</span></div>` : ''}
          ${stats.numKeywords ? `<div class="dd-stat">Keywords <span>${fmtNum(stats.numKeywords)}</span></div>` : ''}
          ${compR.data?.competitors?.length ? `<div class="dd-stat">Competitors <span>${compR.data.competitors.length}</span></div>` : ''}
        </div>
        ${kws.length ? `
        <div class="dd-keywords">
          <div class="dd-kw-label">Top keywords</div>
          <div class="dd-kw-list">
            ${kws.map((k,i) => `<span class="dd-kw-chip${i<3?' top':''}">${k.keyword||k.searchKeyword||'?'}</span>`).join('')}
          </div>
        </div>` : ''}
      </div>`;
  } catch(e) {
    datadiveStatus = 'error';
    document.getElementById('dd-status').textContent = '!';
    document.getElementById('dd-body').innerHTML = `<div style="color:var(--red-light);font-size:12px">DataDive error: ${e.message}. Synthesis can still proceed using screenshots.</div>`;
  }
  updateSynthButton();
}

function fmtNum(n) {
  if (!n && n !== 0) return '–';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toLocaleString();
}

// ─── Screenshot handling ──────────────────────────────────────────────────────
function handleScreenshot(sourceId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const b64 = e.target.result.split(',')[1];
    screenshots[sourceId] = { base64: b64, mimeType: file.type };
    // Update card
    document.getElementById(`sc-${sourceId}`)?.classList.add('ready');
    const badge = document.getElementById(`badge-${sourceId}`);
    if (badge) { badge.textContent = '✓ Ready'; badge.className = 'sc-badge badge-ready'; }
    const preview = document.getElementById(`preview-${sourceId}`);
    const img = document.getElementById(`img-${sourceId}`);
    if (preview && img) { img.src = e.target.result; preview.style.display = 'block'; }
    updateSynthButton();
  };
  reader.readAsDataURL(file);
}

function updateSynthButton() {
  const count = Object.keys(screenshots).length;
  const ddOk = datadiveStatus === 'found' || datadiveStatus === 'notfound' || datadiveStatus === 'error';
  const canSynth = ddOk && (datadiveStatus === 'found' || count >= 1);

  const btn = document.getElementById('synth-btn');
  const status = document.getElementById('synth-status');
  if (!btn || !status) return;

  const ddLabel = datadiveStatus === 'found' ? 'DataDive ✓' : datadiveStatus === 'loading' ? 'DataDive loading…' : 'DataDive –';
  const scLabel = count > 0 ? `${count} of ${SOURCES.length} screenshots` : 'no screenshots yet';
  status.innerHTML = `<strong>${ddLabel}</strong> · ${scLabel}`;
  btn.disabled = !canSynth;
}

// ─── SYNTHESIS ────────────────────────────────────────────────────────────────
async function runSynthesis() {
  appState = 'synthesising';

  const steps = [
    'Analysing DataDive data...',
    'Reading screenshots...',
    'Evaluating market trends...',
    'Building competitive picture...',
    'Writing report...',
  ];
  let stepIdx = 0;

  function stepHtml() {
    return steps.map((s,i) => `
      <div class="synth-step ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : ''}">
        <div class="step-dot"></div>${i < stepIdx ? '✓ ' : ''}${s}
      </div>`).join('');
  }

  setMain(`
    <div class="synth-loading">
      <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
      <div class="loading-label">Synthesising ${confirmedCategory}…</div>
      <div class="synth-steps" id="steps">${stepHtml()}</div>
    </div>`);

  const stepper = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, steps.length - 1);
    const el = document.getElementById('steps');
    if (el) el.innerHTML = stepHtml();
  }, 2500);

  // Build content array
  const content = [];
  content.push({ type: 'text', text: `Please analyse the "${confirmedCategory}" category on Amazon. Period: ${period}. Analyst: ${analyst}.` });

  if (datadiveData) {
    const stats = datadiveData.competitors?.statistics || {};
    const topKws = (datadiveData.keywords?.keywords || []).slice(0, 20);
    const topComps = (datadiveData.competitors?.competitors || []).slice(0, 10);
    content.push({
      type: 'text',
      text: `DATADIVE DATA (pulled directly from API — these numbers are exact):\n` +
        `Niche: ${datadiveData.niche.heroKeyword}\n` +
        `Total Search Volume: ${stats.totalSvOfKeywords || 'N/A'}\n` +
        `Number of Keywords: ${stats.numKeywords || 'N/A'}\n` +
        `Visible Keywords: ${stats.numVisibleKeywords || 'N/A'}\n` +
        `Competitors tracked: ${topComps.length}\n` +
        `Top Keywords (by SV):\n${topKws.map(k => `  - ${k.keyword||k.searchKeyword}: SV ${k.searchVolume||'?'}`).join('\n')}\n` +
        `Top Competitors:\n${topComps.map(c => `  - ${c.brandName||c.asin||'?'}`).join('\n')}`
    });
  } else {
    content.push({ type: 'text', text: `DataDive: No matching niche found. Rely on screenshot sources for market data.` });
  }

  // Add screenshots
  const sourceNames = { trends: 'Google Trends (US, 12 months)', poe: 'Amazon Product Opportunity Explorer (with Insights extension)', smartscout: 'Smart Scout — Brand Market Share', datarova: 'Datarova — YoY Trend Comparison', growth: 'Vendor Central — Growth Opportunities', mpg: 'Vendor Central — Marketplace Product Guidance' };
  for (const [id, data] of Object.entries(screenshots)) {
    content.push({ type: 'text', text: `Screenshot from: ${sourceNames[id] || id}` });
    content.push({ type: 'image', source: { type: 'base64', media_type: data.mimeType, data: data.base64 } });
  }

  const missingScreenshots = SOURCES.filter(s => !screenshots[s.id]).map(s => s.name);
  if (missingScreenshots.length) {
    content.push({ type: 'text', text: `Data NOT provided (screenshots missing): ${missingScreenshots.join(', ')}. Note gaps in your analysis.` });
  }

  content.push({ type: 'text', text: `Produce the JSON analysis below. Be specific with numbers you can see in DataDive or screenshots. Note confidence level if key data is missing.\n\nReturn ONLY this JSON structure with no markdown:\n{"market_trend":"up|down|flat","asp_trend":"up|down|flat","competition_trend":"harder|easier|stable","new_entrants":"high|medium|low","confidence":"high|medium|low","sections":{"market_performance":"...","seasonal_patterns":"...","market_structure":"...","product_search_dynamics":"...","strategic_considerations":{"opportunities":["..."],"challenges":["..."],"risks":["..."]}},"verdict":"one paragraph executive summary","signal_alignment":"one sentence"}` });

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: `You are a senior Amazon market analyst for Lifepro, a health & wellness brand selling exclusively through 1P Vendor Central. You receive data from multiple sources and produce structured category analyses that help PMs make strategic decisions. Be analytical and specific — use exact numbers when available from DataDive, and extract data precisely from screenshots. If a data source is missing, note the gap but still produce actionable insights from what is available.`,
        messages: [{ role: 'user', content }]
      })
    });
    clearInterval(stepper);
    const resp = await r.json();
    const text = resp.content?.[0]?.text || '';
    const json = JSON.parse(text.replace(/```json\n?|\n?```/g,'').trim());

    renderReport(json, confirmedCategory, period, analyst, new Date().toISOString());

    // Save to Supabase
    fetch('/api/analyses?action=save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        category: confirmedCategory,
        period,
        analyst,
        raw_inputs: { keyword: searchKeyword, datadive: datadiveData, screenshots_provided: Object.keys(screenshots) },
        analysis: json,
        market_trend: json.market_trend,
        asp_trend: json.asp_trend,
        competition_trend: json.competition_trend,
        new_entrants: json.new_entrants,
      })
    }).then(() => loadSidebar()).catch(() => {});

  } catch(e) {
    clearInterval(stepper);
    setMain(`<div class="loading-wrap"><div style="color:var(--red-light);font-size:13px">Synthesis failed: ${e.message}</div><button class="btn-ghost" style="margin-top:12px" onclick="goHome()">← Start over</button></div>`);
  }
}

// ─── REPORT RENDER ────────────────────────────────────────────────────────────
function renderReport(a, category, period, analyst, createdAt) {
  appState = 'report';
  const date = createdAt ? new Date(createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

  function sigPill(label, val, clsMap, labelMap) {
    if (!val) return '';
    const cls = clsMap[val] || 'sig-flat';
    const lbl = (labelMap && labelMap[val]) || val;
    return `<span class="sig-pill ${cls}">${label}: ${lbl}</span>`;
  }

  setMain(`
    <div class="report-wrap">
      <div class="report-header">
        <div class="report-title">${category}</div>
        <div class="report-meta">${period} · ${analyst} · ${date}</div>
        <div class="signal-row">
          ${sigPill('Market', a.market_trend, {up:'sig-up',down:'sig-down',flat:'sig-flat'}, {up:'↑ Growing',down:'↓ Declining',flat:'→ Flat'})}
          ${sigPill('ASP', a.asp_trend, {up:'sig-up',down:'sig-down',flat:'sig-flat'}, {up:'↑ Rising',down:'↓ Falling',flat:'→ Stable'})}
          ${sigPill('Competition', a.competition_trend, {harder:'sig-harder',easier:'sig-easier',stable:'sig-stable'}, {harder:'Harder',easier:'Easier',stable:'Stable'})}
          ${sigPill('New Entrants', a.new_entrants, {high:'sig-high',medium:'sig-medium',low:'sig-low'}, {high:'High',medium:'Medium',low:'Low'})}
          ${a.confidence ? sigPill('Confidence', a.confidence, {high:'sig-up',medium:'sig-medium',low:'sig-flat'}, {high:'High',medium:'Medium',low:'Low'}) : ''}
        </div>
      </div>

      ${a.verdict ? `<div class="verdict-box"><div class="verdict-label">Executive Summary</div>${a.verdict}</div>` : ''}

      ${a.sections?.market_performance ? `<div class="section-card"><div class="section-card-title">Market Performance</div><div class="section-card-body">${a.sections.market_performance}</div></div>` : ''}
      ${a.sections?.seasonal_patterns ? `<div class="section-card"><div class="section-card-title">Seasonal Patterns</div><div class="section-card-body">${a.sections.seasonal_patterns}</div></div>` : ''}
      ${a.sections?.market_structure ? `<div class="section-card"><div class="section-card-title">Market Structure & Competition</div><div class="section-card-body">${a.sections.market_structure}</div></div>` : ''}
      ${a.sections?.product_search_dynamics ? `<div class="section-card"><div class="section-card-title">Product & Search Dynamics</div><div class="section-card-body">${a.sections.product_search_dynamics}</div></div>` : ''}

      ${a.sections?.strategic_considerations ? `
      <div class="strategic-grid">
        <div class="strat-card strat-opp">
          <div class="strat-title">Opportunities</div>
          <ul class="strat-list">${(a.sections.strategic_considerations.opportunities||[]).map(o=>`<li>${o}</li>`).join('')}</ul>
        </div>
        <div class="strat-card strat-chal">
          <div class="strat-title">Challenges</div>
          <ul class="strat-list">${(a.sections.strategic_considerations.challenges||[]).map(c=>`<li>${c}</li>`).join('')}</ul>
        </div>
        <div class="strat-card strat-risk">
          <div class="strat-title">Risks</div>
          <ul class="strat-list">${(a.sections.strategic_considerations.risks||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
        </div>
      </div>` : ''}

      ${a.signal_alignment ? `<div class="signal-align">${a.signal_alignment}</div>` : ''}

      <div class="report-actions">
        <button class="btn-ghost" onclick="goHome()">+ New Analysis</button>
      </div>
    </div>`);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadSidebar();
renderHome();
</script>
</body>
